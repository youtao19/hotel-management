name: Node.js Tests with PostgreSQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    # 👇 1. 在这里添加全局环境变量，让 Node.js 知道使用中国时间
    env:
      TZ: 'Asia/Shanghai'

    services:
      postgres:
        image: postgres:17.6-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: peach
          POSTGRES_PASSWORD: 1219
          POSTGRES_DB: hotel_db_test
          # 👇 2. 让 Postgres 数据库也使用中国时区
          TZ: 'Asia/Shanghai'
          PGTZ: 'Asia/Shanghai'
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        # 👇 3. (可选) Redis 时区
        env:
          TZ: 'Asia/Shanghai'
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      # - name: Install dotenv-cli
      #   run: npm install -g dotenv-cli

      - name: Run Jest tests (CI env)
        # 运行测试
        run: npm --workspace backend run test:ci